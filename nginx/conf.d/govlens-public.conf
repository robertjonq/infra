# govlens-public.conf — holding page for govlens.ie (Stage 1 of 2).
#
# STAGE 1 (current): static holding page served over HTTP only.
#   - govlens.ie registered, DNS A records → 79.97.104.151 (ubdock).
#   - No TLS cert yet; the full Flask app is not production-ready.
#   - This block serves infra/nginx/holding/index.html for any request
#     to govlens.ie or www.govlens.ie on port 80.
#   - Also serves /.well-known/acme-challenge/ from /var/www/acme so a
#     future acme.sh HTTP-01 issuance for the real cert works without
#     a config change.
#
# STAGE 2 (later): flip to TLS + Flask upstream.
#   - Run acme.sh --issue --webroot /var/www/acme -d govlens.ie -d www.govlens.ie
#     --reloadcmd "docker kill -s HUP infra-nginx"
#   - Replace this file with the full HTTPS + proxy_pass govlens_public_web
#     config (see the historical govlens-public.conf.pending in git for a
#     starting point). Container expected: govlens-web:5000 on infra_backend.
#   - docker kill -s HUP infra-nginx
#
# Rollback (if stage 2 ever goes wrong): restore this file + SIGHUP.

server {
    listen 80;
    server_name govlens.ie www.govlens.ie;

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    include /etc/nginx/snippets/scanners.conf;

    # ACME HTTP-01 challenge webroot — ready for when we issue a cert.
    # acme.sh writes challenge files to /var/www/acme on the host; the
    # docker-compose mount makes them readable inside the container.
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type "text/plain";
    }

    # Canonicalise www → apex (still HTTP for stage 1).
    if ($host = www.govlens.ie) {
        return 301 http://govlens.ie$request_uri;
    }

    # Everything else serves the static holding page.
    root /var/www/govlens-holding;
    index index.html;

    # Serve favicon/assets directly; any unknown path falls back to the
    # holding page so /anything still renders "coming soon".
    location / {
        limit_req zone=per_ip burst=20 nodelay;
        limit_req_status 429;
        try_files $uri /index.html;
    }
}
