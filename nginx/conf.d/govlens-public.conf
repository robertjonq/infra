# govlens-public.conf — holding page for govlens.ie (Stage 1 of 2).
#
# STAGE 1 (current): static holding page served over HTTPS, with
# HTTP → HTTPS upgrade.
#   - govlens.ie + www.govlens.ie DNS A records → ubdock public IP.
#   - Let's Encrypt cert issued via acme.sh HTTP-01; webroot wired
#     here at /.well-known/acme-challenge/ so future renewals work
#     without any config change.
#   - No Flask app exposed — only the static "coming soon" page.
#   - www → apex canonicalised on both :80 and :443.
#
# STAGE 2 (later): flip to Flask upstream.
#   - Bring up govlens Flask container on infra_backend
#     (container_name govlens-web, listening on :5000).
#   - Replace this file with the Stage 2 reference
#     (see govlens-public.conf.pending in git).
#   - docker kill -s HUP infra-nginx
#
# Rollback: restore this file + SIGHUP.

# ── HTTP :80 — acme-challenge + upgrade everything else to HTTPS ────
server {
    listen 80;
    server_name govlens.ie www.govlens.ie;

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    include /etc/nginx/snippets/scanners.conf;

    # MUST remain on :80 (Let's Encrypt HTTP-01 only probes port 80).
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type "text/plain";
    }

    # Everything else: upgrade to HTTPS apex in one hop (handles both
    # http://govlens.ie and http://www.govlens.ie).
    location / {
        return 301 https://govlens.ie$request_uri;
    }
}

# ── HTTPS :443 — apex, serves holding page ──────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name govlens.ie;
    client_max_body_size 10m;

    ssl_certificate     /etc/letsencrypt/live/govlens.ie/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/govlens.ie/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    include /etc/nginx/snippets/scanners.conf;

    root /var/www/govlens-holding;
    index index.html;

    location / {
        limit_req zone=per_ip burst=20 nodelay;
        limit_req_status 429;
        try_files $uri /index.html;
    }
}

# ── HTTPS :443 — www → apex 301 ─────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name www.govlens.ie;

    ssl_certificate     /etc/letsencrypt/live/govlens.ie/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/govlens.ie/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://govlens.ie$request_uri;
}
