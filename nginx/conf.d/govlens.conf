# govlens.conf — server blocks for the govlens / pmem tenant.
#
# Two server blocks:
#   :80  — LAN-only (geo-blocked to 192.168.50.0/24 via $lan)
#   :443 — public via therecord.duckdns.org (Flask login enforces auth)
#
# Upstream: public-record-web on port 5000, reachable over the
# infra_backend network. pmem's docker-compose.yml must declare the
# `web` service with `networks: [infra_backend]` (external) for DNS
# to resolve the container name from here.

upstream govlens_web {
    server public-record-web:5000;
}

# ── HTTP (LAN only, port 8082) ───────────────────────────────────────
# Moved off :80 on 2026-04-24 to hand port 80 to govlens.ie. LAN access
# is now http://192.168.50.169:8082/ — add the port to any bookmarks
# / scripts that were using the raw IP on :80.
server {
    listen 8082;
    server_name _;
    client_max_body_size 50m;

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Block anyone not on LAN
    if ($lan = 0) {
        return 403;
    }

    include /etc/nginx/snippets/scanners.conf;

    location /login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://govlens_web;
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_read_timeout 10s;
    }

    location /admin {
        limit_req zone=admin burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://govlens_web;
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_read_timeout 30s;
    }

    location / {
        limit_req zone=per_ip burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://govlens_web;
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_read_timeout 30s;
    }
}

# ── HTTPS (public) ───────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name therecord.duckdns.org;
    client_max_body_size 50m;

    ssl_certificate     /etc/letsencrypt/live/therecord.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/therecord.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    include /etc/nginx/snippets/scanners.conf;

    location /login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://govlens_web;
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_read_timeout 10s;
    }

    location /admin {
        limit_req zone=admin burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://govlens_web;
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_read_timeout 30s;
    }

    location / {
        limit_req zone=per_ip burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://govlens_web;
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_read_timeout 30s;
    }
}
