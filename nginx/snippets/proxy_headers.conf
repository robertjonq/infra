# Standard proxy header set for upstream Flask apps.
# Include from any `location` block with:
#   include /etc/nginx/snippets/proxy_headers.conf;
#
# Deliberately does NOT set proxy_read_timeout — per-location blocks
# set their own, and nginx rejects duplicate directives in the same
# location (include-then-override is a conflict, not an override).

proxy_set_header   Host              $host;
proxy_set_header   X-Real-IP         $remote_addr;
proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header   X-Forwarded-Proto $scheme;
