# Reusable scanner-blocking rules.
# Include from any server block with:
#   include /etc/nginx/snippets/scanners.conf;
#
# Returns 444 (drop connection without response) on:
#   - common script/config file extensions used by automated scanners
#   - common exploit / CMS probe path prefixes
#   - empty User-Agent (almost always bot traffic)

location ~* \.(php|asp|aspx|jsp|cgi|shtml|jsa|jhtml|pl|env|git|svn|htaccess|DS_Store)$ {
    return 444;
}
location ~* ^/(wp-|wordpress|xmlrpc|phpmy|phpmyadmin|admin\.php|shell|eval|passwd) {
    return 444;
}
if ($http_user_agent = "") {
    return 444;
}
