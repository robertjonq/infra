# Main nginx config for infra-nginx — shared reverse proxy for all
# tenant projects on this host. Overrides the default nginx.conf
# shipped with nginx:alpine so we own the http{} globals.
#
# Per-tenant server blocks live in /etc/nginx/conf.d/*.conf and are
# auto-loaded by the include directive at the bottom of the http{}
# block. Reusable fragments (scanner blocking, proxy headers) live in
# /etc/nginx/snippets/*.conf.

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # ── Rate-limit zones (shared across all tenants) ─────────────────
    # Per-IP default bucket — 10 req/s, 10MB state (~160k IPs tracked)
    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=10r/s;
    # Stricter bucket for admin routes
    limit_req_zone $binary_remote_addr zone=admin:10m  rate=2r/s;
    # Very strict bucket for login — 5 requests per minute
    limit_req_zone $binary_remote_addr zone=login:10m  rate=5r/m;

    # ── LAN allowlist (for tenants using LAN-only port 80) ───────────
    geo $lan {
        default          0;
        192.168.50.0/24  1;
    }

    # ── Per-tenant server blocks ─────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
