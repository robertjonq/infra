name: infra

# Shared infrastructure for all projects on this host.
#
# - postgres: multi-tenant cluster. Each project gets its own DB + role.
#   Admin (superuser) is the built-in `postgres` role; per-project roles
#   are provisioned via postgres/provisioning/*.sql (run manually).
#
# - nginx: shared reverse proxy. Gated behind the `nginx` profile so
#   `docker compose up -d` starts postgres only. Bring nginx up with
#   `docker compose --profile nginx up -d nginx` ONLY after the old
#   pmem-owned nginx has been stopped — both bind ports 80/443.
#
# Tenants attach to the `infra_backend` network from their own compose
# files and connect via hostname `infra-postgres` on port 5432, or are
# proxied by the shared nginx via container name on the same network.
#
# Postgres is deliberately NOT exposed on a host port. Tenant access is
# docker-network-only. For ops: `docker compose exec postgres psql -U postgres`.

services:
  postgres:
    image: postgres:16-alpine
    container_name: infra-postgres
    restart: unless-stopped

    environment:
      # Built-in superuser. POSTGRES_USER and POSTGRES_DB omitted so
      # the entrypoint defaults to user=postgres, db=postgres. The
      # password below is the admin account for the whole cluster.
      - POSTGRES_PASSWORD=${POSTGRES_ADMIN_PASSWORD}
      - TZ=Europe/Dublin

    volumes:
      # Fresh volume — deliberately not `prp_postgres` (that one stays
      # attached to the old pmem compose during the migration window).
      - infra_postgres:/var/lib/postgresql/data
      # Provisioning SQL mounted read-only. Scripts are run manually
      # via `docker compose exec postgres psql -f /provisioning/...`
      # rather than via docker-entrypoint-initdb.d, so they stay
      # re-runnable and auditable against the live cluster.
      - ./postgres/provisioning:/provisioning:ro

    # Canonical 5432 on the LAN. Old pmem-owned postgres retired
    # 2026-04-21. Dev-machine tooling (pgAdmin, psycopg2 scripts)
    # connects via 192.168.50.169:5432. Tenant containers on
    # infra_backend still use the internal hostname
    # (`infra-postgres:5432`) — unchanged by host-port choice.
    #
    # Not routable from the public internet — ubdock's gateway does
    # not forward 5432. scram-sha-256 auth still gates access.
    ports:
      - "5432:5432"

    networks:
      - infra_backend

    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    # Profile-gated: `docker compose up -d` skips this; to start:
    #   docker compose --profile nginx up -d nginx
    # Do NOT start while the old pmem-owned nginx is still running —
    # both services bind host ports 80 and 443.
    profiles: ["nginx"]
    image: nginx:alpine
    container_name: infra-nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      # Main config — overrides the image default so we own the http{}
      # context (log format, rate-limit zones, geo block, includes).
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Per-tenant server blocks. Add a file per tenant; nginx reload
      # picks it up without restarting the container.
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Reusable snippets (scanner blocking, proxy header sets).
      - ./nginx/snippets:/etc/nginx/snippets:ro
      # Let's Encrypt certs managed by acme.sh on the host.
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Stage-1 govlens.ie holding page (static, HTTP-only). Served
      # by conf.d/govlens-public.conf until the real Flask app is
      # ready to cut over.
      - ./nginx/holding:/var/www/govlens-holding:ro

    networks:
      - infra_backend

    deploy:
      resources:
        limits:
          memory: 128m
        reservations:
          memory: 32m

    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"

volumes:
  infra_postgres:
    name: infra_postgres

networks:
  # External network — tenants attach from their own compose files via:
  #   networks:
  #     infra_backend:
  #       external: true
  infra_backend:
    name: infra_backend
    driver: bridge
